<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pixel AI</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">


    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap"
        rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- Mouse Glow -->
    <div class="cursor-glow"></div>

    <div class="app">

        <!-- ===================== -->
        <!-- Sidebar -->
        <!-- ===================== -->

        <aside class="sidebar" id="sidebar">
            

    <!-- Header -->

    <div class="sidebar-header">

        <button id="newChatBtn" class="new-chat">

            <i class="fa-solid fa-plus"></i>

            <span>New Chat</span>

        </button>

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchConversation"
                placeholder="Search chats">

        </div>

    </div>


    <!-- Conversation History -->

    <div class="chat-history">

        <div class="history-group" id="todayGroup">

            <div class="history-title">

                TODAY

            </div>

            <div class="conversation-list" id="todayList"></div>

        </div>

        <div class="history-group" id="yesterdayGroup">

            <div class="history-title">

                YESTERDAY

            </div>

            <div class="conversation-list" id="yesterdayList"></div>

        </div>

        <div class="history-group" id="weekGroup">

            <div class="history-title">

                LAST 7 DAYS

            </div>

            <div class="conversation-list" id="weekList"></div>

        </div>

        <div class="history-group" id="monthGroup">

            <div class="history-title">

                LAST MONTH

            </div>

            <div class="conversation-list" id="monthList"></div>

        </div>

    </div>


    <!-- Footer -->

    <div class="sidebar-footer">

        <button class="nav-btn">

            <i class="fa-solid fa-gear"></i>

            <span class="nav-text">

                Settings

            </span>

        </button>

        <button class="nav-btn">

            <i class="fa-regular fa-user"></i>

            <span class="nav-text">

                Profile

            </span>

        </button>

    </div>

</aside>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
        <!-- ===================== -->
        <!-- Main -->
        <!-- ===================== -->

        <main class="main">

            <!-- ===================== -->
            <!-- Top Bar -->
            <!-- ===================== -->

            <header class="topbar">

                <div class="top-left">

                    <button id="menuBtn" class="menu-btn">

                        <i class="fa-solid fa-bars"></i>

                    </button>

                    <div class="brand">

                        Pixel

                    </div>

                </div>

                <!-- Model Selector -->

                <div class="model-selector">

                    <button id="modelButton">

                        ✨ Auto

                        <span>▼</span>

                    </button>

                    <div class="model-menu" id="modelMenu">

                        <div class="model-item" data-model="auto">
                            ✨ Auto
                        </div>

                        <div class="model-item" data-model="llama">
                            💬 Llama 3.3 70B
                        </div>

                        <div class="model-item" data-model="qwen">
                            💻 Qwen Coder
                        </div>

                        <div class="model-item" data-model="groq">
                            ⚡ Groq Compound
                        </div>

                    </div>

                </div>

                <!-- Right Buttons -->

                <div class="top-actions">

                    <button>

                        <i class="fa-solid fa-magnifying-glass"></i>

                    </button>

                    <button>

                        <i class="fa-solid fa-gear"></i>

                    </button>

                    <button>

                        <i class="fa-regular fa-user"></i>

                    </button>

                </div>

            </header>

            <!-- ===================== -->
            <!-- Chat -->
            <!-- ===================== -->

            <section class="chat-container">

                <div class="welcome">

                    <h1>Pixel</h1>

                    <p>

                        Your intelligent AI companion.

                    </p>

                </div>

                <div id="chatArea"></div>

            </section>

            <!-- ===================== -->
            <!-- Prompt -->
            <!-- ===================== -->

            <div class="text_bar">

                <button class="icon-btn">

                    <i class="fa-solid fa-paperclip"></i>

                </button>

                <textarea
                    rows="1"
                    placeholder="Ask anything..."></textarea>

                <button class="icon-btn">

                    <i class="fa-solid fa-microphone"></i>

                </button>

                <button class="send-btn">

                    <i class="fa-solid fa-arrow-up"></i>

                </button>

            </div>

        </main>

    </div>

    <!-- ===================== -->
    <!-- Scripts -->
    <!-- ===================== -->


    <script src="js/config.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>

    <script src="js/formatter.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/models.js"></script>

    <script src="js/conversations.js"></script>

    
    <script src="js/sidebar.js"></script>

    <script src="js/codeblock.js"></script>

    <script src="js/chat.js"></script>




</body>

</html>
