<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pixel AI | Login</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/6f5b2f4d37.js" crossorigin="anonymous"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

    <div class="cursor-glow"></div>






    <div class="container">

        <!-- LEFT SIDE -->

        <section class="left-panel">

            <div class="left-content">

                <div class="logo">

                    <div class="logo-circle">
                        P
                    </div>

                    <h1>Pixel</h1>

                    <p>
                        Your intelligent AI companion built for creators.
                    </p>

                </div>

                <div class="feature-list">

                    <div class="feature">
                        <i class="fa-solid fa-bolt"></i>
                        <span>Lightning Fast</span>
                    </div>

                    <div class="feature">
                        <i class="fa-solid fa-shield-halved"></i>
                        <span>Private & Secure</span>
                    </div>

                    <div class="feature">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>Creative AI</span>
                    </div>

                </div>

            </div>

        </section>

        <!-- RIGHT SIDE -->

        <section class="right-panel">

            <div class="login-card">

                <div class="heading">

                    <h2>Welcome Back</h2>

                    <p>
                        Sign in to continue your conversations.
                    </p>

                </div>

                <form id="loginForm">

                    <div class="input-group">

                        <label>Email</label>

                        <input
                            type="email"
                            id="email"
                            placeholder="you@example.com">

                    </div>

                    <div class="input-group">

                        <label>Password</label>

                        <div class="password-box">

                            <input
                                type="password"
                                id="password"
                                placeholder="••••••••">

                            <button
                                type="button"
                                id="togglePassword"
                                class="eye-btn">

                                <i class="fa-regular fa-eye"></i>

                            </button>

                        </div>

                    </div>

                    <div class="row">

                        <label class="remember">

                            <input type="checkbox">

                            Remember me

                        </label>

                        <a href="#">
                            Forgot Password?
                        </a>

                    </div>

                    <button
                        type="submit"
                        class="login-btn">

                        Sign In

                    </button>

                </form>

                <div class="divider">
    <span>OR</span>
</div>

<button
    id="googleLogin"
    class="google-btn"
    type="button">

    <i class="fa-brands fa-google"></i>

    Continue with Google

</button>

<p class="signup-text">

    Don't have an account?

    <a href="signup.html">Create Account</a>

</p>

            </div>

        </section>

    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/login.js"></script>

</body>

</html>
